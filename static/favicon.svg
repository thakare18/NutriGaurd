<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3ab954;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f7d3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tomatoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d63a1b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bowl base -->
  <path d="M40,100 Q40,140 100,155 Q160,140 160,100" fill="url(#bowlGrad)" stroke="#1f7d3d" stroke-width="2"/>
  
  <!-- Bowl top rim -->
  <ellipse cx="100" cy="100" rx="60" ry="20" fill="#3ab954" opacity="0.8"/>
  
  <!-- Bowl smile/shine -->
  <path d="M55,110 Q100,130 145,110" fill="none" stroke="#5dd171" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Left Broccoli -->
  <g>
    <line x1="65" y1="95" x2="50" y2="55" stroke="#2f7d3d" stroke-width="4" stroke-linecap="round"/>
    <circle cx="48" cy="48" r="10" fill="#3ab954"/>
    <circle cx="42" cy="38" r="8" fill="#4cd964"/>
    <circle cx="55" cy="42" r="8" fill="#4cd964"/>
    <circle cx="58" cy="52" r="8" fill="#4cd964"/>
  </g>
  
  <!-- Center leafy greens -->
  <g>
    <line x1="100" y1="95" x2="100" y2="35" stroke="#2f7d3d" stroke-width="3" stroke-linecap="round"/>
    <!-- Left leaves -->
    <path d="M100,40 Q90,35 85,25" fill="none" stroke="#3ab954" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="90" cy="32" rx="5" ry="10" fill="#4cd964" opacity="0.9"/>
    <!-- Center leaf -->
    <path d="M100,35 Q100,20 100,10" fill="none" stroke="#3ab954" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="100" cy="12" rx="4" ry="8" fill="#4cd964" opacity="0.9"/>
    <!-- Right leaves -->
    <path d="M100,40 Q110,35 115,25" fill="none" stroke="#3ab954" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="110" cy="32" rx="5" ry="10" fill="#4cd964" opacity="0.9"/>
  </g>
  
  <!-- Right branch with leaves -->
  <g>
    <line x1="130" y1="90" x2="155" y2="30" stroke="#2f7d3d" stroke-width="3.5" stroke-linecap="round"/>
    <ellipse cx="148" cy="48" rx="5" ry="12" fill="#4cd964" transform="rotate(-25 148 48)"/>
    <ellipse cx="158" cy="38" rx="5" ry="12" fill="#4cd964" transform="rotate(-20 158 38)"/>
    <ellipse cx="165" cy="28" rx="5" ry="12" fill="#4cd964" transform="rotate(-15 165 28)"/>
  </g>
  
  <!-- Red Tomato -->
  <g>
    <circle cx="125" cy="68" r="14" fill="url(#tomatoGrad)"/>
    <!-- Tomato shine -->
    <circle cx="120" cy="60" r="4" fill="#ff9966" opacity="0.6"/>
    <!-- Stem -->
    <rect x="123" y="52" width="4" height="6" fill="#ff6b35" rx="2"/>
  </g>
  
  <!-- Floating peas -->
  <circle cx="75" cy="25" r="4" fill="#4cd964"/>
  <circle cx="100" cy="15" r="3.5" fill="#4cd964"/>
  <circle cx="135" cy="20" r="4" fill="#4cd964"/>
</svg>
